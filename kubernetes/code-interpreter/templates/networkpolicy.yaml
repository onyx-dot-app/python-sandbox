{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "code-interpreter.fullname" . }}
  labels:
    {{- include "code-interpreter.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "code-interpreter.selectorLabels" . | nindent 6 }}
  policyTypes:
    {{- toYaml .Values.networkPolicy.policyTypes | nindent 4 }}
  {{- with .Values.networkPolicy.ingress }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.networkPolicy.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
# NetworkPolicy for the ephemeral executor/session pods spawned by the
# code-interpreter. These pods run user-submitted code and must be fully
# network-isolated to prevent data exfiltration and SSRF attacks. It is always
# applied (independent of networkPolicy.enabled, which only governs the
# API-server pod policy above).
#
# Selects both the one-shot exec pods ("component: executor") and the
# longer-lived session pods ("component: session"); both carry "app:
# code-interpreter" and run untrusted code, so both are locked down. It is
# pinned to the executor namespace, which may differ from the release namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "code-interpreter.fullname" . }}-executor
  namespace: {{ include "code-interpreter.kubernetesNamespace" . }}
  labels:
    {{- include "code-interpreter.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: code-interpreter
    matchExpressions:
      - key: component
        operator: In
        values:
          - executor
          - session
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow exec connections from the code-interpreter service pod
    - from:
        - podSelector:
            matchLabels:
              {{- include "code-interpreter.selectorLabels" . | nindent 14 }}
  egress: []
  # Deny all egress — executor pods must not have network access